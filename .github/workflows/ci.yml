name: QA Automation Suite

on:
  push:
    branches: [main, develop, feature/**]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * *"

jobs:
  selenium-tests:
    name: Selenium UI Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
      - run: pip install -r requirements.txt
      - uses: browser-actions/setup-chrome@v1
      - name: Run UI tests headless
        run: pytest tests/ --headless --html=reports/ui_report.html --self-contained-html -v
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: ui-test-report, path: reports/ui_report.html, retention-days: 30 }

  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - run: pytest api_tests/ --html=reports/api_report.html --self-contained-html -v -m api
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: api-test-report, path: reports/api_report.html, retention-days: 30 }

  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: [selenium-tests, api-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - uses: browser-actions/setup-chrome@v1
      - run: pytest tests/ --headless -m smoke -v
