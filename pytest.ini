[pytest]
addopts =
    -v
    --tb=short
    --html=reports/report.html
    --self-contained-html

markers =
    smoke:      Quick sanity-check before full suite
    regression: Full regression suite
    negative:   Negative and error-path tests
    api:        API-level tests
    datadriven: Excel data-driven tests

testpaths = tests api_tests
